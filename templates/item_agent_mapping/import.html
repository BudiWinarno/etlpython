<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Import Master Item Agent</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card shadow">

                <div class="card-header bg-success text-white">
                    <h4 class="mb-0">Import Master Item Agent</h4>
                </div>

                <div class="card-body">

                    <form
                        action="/item-agent-mapping/import"
                        method="POST"
                        enctype="multipart/form-data"
                    >

                        <div class="mb-3">
                            <label class="form-label">Agent</label>

                            <select
                                name="agent_id"
                                class="form-select"
                                required
                            >
                                {% for agent in agents %}

                                <option value="{{ agent.id }}">
                                    {{ agent.kode_agent }} - {{ agent.nama_agent }}
                                </option>

                                {% endfor %}
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">
                                File Excel (.xlsx)
                            </label>

                            <input
                                type="file"
                                name="file"
                                class="form-control"
                                accept=".xlsx"
                                required
                            >

                            <div class="form-text">
                                Format file harus .xlsx
                            </div>
                        </div>

                        <div class="d-flex justify-content-between">

                            <a href="/item-agent-mapping"
                               class="btn btn-secondary">
                                ← Kembali
                            </a>

                            <button
                                type="submit"
                                class="btn btn-success">
                                Import
                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
