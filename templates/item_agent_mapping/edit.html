<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Master Item Agent</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-8">

            <div class="card shadow">

                <div class="card-header bg-warning">
                    <h4 class="mb-0">Edit Master Item Agent</h4>
                </div>

                <div class="card-body">

                    <form action="/item-agent-mapping/update/{{ mapping.id }}" method="POST">

                        <div class="mb-3">
                            <label class="form-label">Agent</label>

                            <select name="agent_id" class="form-select" required>

                                {% for agent in agents %}

                                <option value="{{ agent.id }}"
                                    {% if agent.id == mapping.agent_id %}selected{% endif %}>
                                    {{ agent.kode_agent }} - {{ agent.nama_agent }}
                                </option>

                                {% endfor %}

                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Kode SKU Agent</label>

                            <input
                                type="text"
                                name="kode_sku_agent"
                                class="form-control"
                                value="{{ mapping.kode_sku_agent }}"
                                required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Kode SKU JIM</label>

                            <input
                                type="text"
                                name="kode_sku_jim"
                                class="form-control"
                                value="{{ mapping.kode_sku_jim }}"
                                required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Nama SKU JIM</label>

                            <input
                                type="text"
                                name="nama_sku_jim"
                                class="form-control"
                                value="{{ mapping.nama_sku_jim }}"
                                required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Item Box</label>

                            <input
                                type="number"
                                name="item_box"
                                class="form-control"
                                min="1"
                                step="1"
                                value="{{ mapping.item_box|int }}"
                                required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Item Group</label>

                            <input
                                type="text"
                                name="item_group"
                                class="form-control"
                                value="{{ mapping.item_group }}"
                                required>
                        </div>

                        <div class="d-flex justify-content-between">

                            <a href="/item-agent-mapping" class="btn btn-secondary">
                                ← Kembali
                            </a>

                            <button type="submit" class="btn btn-warning">
                                Update
                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
