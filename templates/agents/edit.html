<!DOCTYPE html>
<html>
<head>
    <title>Edit Agent</title>
</head>
<body>

<h2>Edit Agent</h2>

<form method="POST">

    <p>Kode Agent</p>
    <input
        type="text"
        name="kode_agent"
        value="{{ agent.kode_agent }}"
    >

    <p>Nama Agent</p>
    <input
        type="text"
        name="nama_agent"
        value="{{ agent.nama_agent }}"
    >

    <br><br>

    <button type="submit">Update</button>

</form>

<br>

<a href="/agents">Kembali</a>

</body>
</html>
