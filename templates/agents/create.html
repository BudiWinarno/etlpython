<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tambah Agent</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">

    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">Tambah Agent</h4>
                </div>

                <div class="card-body">

                    <form method="POST">

                        <div class="mb-3">
                            <label class="form-label">Kode Agent</label>
                            <input type="text"
                                   name="kode_agent"
                                   class="form-control"
                                   placeholder="Masukkan Kode Agent"
                                   required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Nama Agent</label>
                            <input type="text"
                                   name="nama_agent"
                                   class="form-control"
                                   placeholder="Masukkan Nama Agent"
                                   required>
                        </div>

                        <div class="d-flex justify-content-between">
                            <a href="/agents" class="btn btn-secondary">
                                ← Kembali
                            </a>

                            <button type="submit" class="btn btn-success">
                                Simpan
                            </button>
                        </div>

                    </form>

                </div>
            </div>

        </div>
    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
