<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generate Stock</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card shadow">

                <div class="card-header bg-success text-white">
                    <h4 class="mb-0">Generate Stock</h4>
                </div>

                <div class="card-body">

                    <form action="/generate-stock"
                          method="POST"
                          enctype="multipart/form-data">

                        <div class="mb-3">
                            <label class="form-label">Template</label>

                            <select
                                name="template_id"
                                class="form-select"
                                required>

                                {% for t in templates %}

                                <option value="{{ t.id }}">
                                    {{ t.template_name }}
                                </option>

                                {% endfor %}

                            </select>

                        </div>

                        <div class="mb-3">
                            <label class="form-label">Pilih Bulan</label>

                            <select
                                name="bulan"
                                class="form-select"
                                required>

                                {% for i in range(1,13) %}

                                <option value="{{ i }}">
                                    {{ i }}
                                </option>

                                {% endfor %}

                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Tahun</label>

                            <select
                                name="tahun"
                                class="form-select"
                                required>

                                {% for i in range(2024,2031) %}

                                <option value="{{ i }}">
                                    {{ i }}
                                </option>

                                {% endfor %}

                            </select>
                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                File Stock
                            </label>

                            <input
                                type="file"
                                name="file"
                                class="form-control"
                                accept=".xlsx,.xls,.xlsb"
                                required>

                            <div class="form-text">
                                Upload file stock yang akan diproses.
                            </div>

                        </div>

                        <div class="d-flex justify-content-between">

                            <a href="/" class="btn btn-secondary">
                                ← Kembali
                            </a>

                            <button
                                type="submit"
                                class="btn btn-success">

                                Generate Stock

                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
