<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>Import Data Insell</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container py-4">

    <div class="card shadow-sm">

        <div class="card-header d-flex justify-content-between align-items-center">

            <h4 class="mb-0">
                Import Data Insell
            </h4>

            <a href="/insell-reports/" class="btn btn-secondary">
                Back
            </a>

        </div>

        <div class="card-body">

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}

                {% for category, message in messages %}

                    <div class="alert alert-{{ category }}">
                        {{ message }}
                    </div>

                {% endfor %}

            {% endif %}
            {% endwith %}

            <form
                method="POST"
                action="/insell-reports/import"
                enctype="multipart/form-data">

                <div class="mb-3">

                    <label class="form-label">
                        Agent
                    </label>

                    <select
                        name="agent_id"
                        class="form-select"
                        required>

                        <option value="">
                            -- Pilih Agent --
                        </option>

                        {% for agent in agents %}

                        <option value="{{ agent.id }}">
                            {{ agent.kode_agent }} - {{ agent.nama_agent }}
                        </option>

                        {% endfor %}

                    </select>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        File Excel
                    </label>

                    <input
                        type="file"
                        name="file"
                        class="form-control"
                        accept=".xlsx,.xls"
                        required>

                </div>

                <div class="d-flex gap-2">

                    <button class="btn btn-primary">
                        Import
                    </button>

                    <a href="/insell-reports/" class="btn btn-secondary">
                        Cancel
                    </a>

                </div>

            </form>

        </div>

    </div>

</div>

</body>

</html>
