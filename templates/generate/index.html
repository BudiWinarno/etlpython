<h2>Generate Excel</h2>

<form action="/generate" method="POST" enctype="multipart/form-data">

    <label>Template</label>

    <select name="template_id">

        {% for t in templates %}

        <option value="{{ t.id }}">
            {{ t.template_name }}
        </option>

        {% endfor %}

    </select>

    <br><br>

    <label>Bulan</label>

    <select name="bulan" required>

        {% for i in range(1,13) %}

        <option value="{{ i }}">
            {{ i }}
        </option>

        {% endfor %}

    </select>

    <br><br>

    <label>Tahun</label>

    <select name="tahun" required>

        {% for y in range(2024,2031) %}

        <option value="{{ y }}">
            {{ y }}
        </option>

        {% endfor %}

    </select>

    <br><br>

    <input
        type="file"
        name="file"
        required
    >

    <br><br>

    <button type="submit">

        Generate

    </button>

</form>

<br><br>

<a href="/">Kembali Ke HomePage</a>
