<!doctype html>

<html>

<head>

    <title>Generate CMO</title>

</head>

<body>

<h2>Generate CMO</h2>

<form
    method="POST"
    action="/generate-cmo"
>

    <p>Agent</p>

    <select name="agent_id" required>

        <option value="">
            -- Pilih Agent --
        </option>

        {% for agent in agents %}

        <option value="{{ agent.id }}">

            {{ agent.kode_agent }} - {{ agent.nama_agent }}

        </option>

        {% endfor %}

    </select>

    <p>Bulan</p>

    <select
        name="bulan"
        required
    >

        {% for i in range(1,13) %}

        <option value="{{ i }}">

            {{ "%02d"|format(i) }}

        </option>

        {% endfor %}

    </select>

    <p>Tahun</p>

    <input
        type="number"
        name="tahun"
        value="2026"
        required
    >

    <br><br>

    <button type="submit">

        Generate CMO

    </button>

</form>

<br>

<a href="/">

    Kembali

</a>

</body>

</html>
