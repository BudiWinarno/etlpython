<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generate CMO</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card shadow">

                <div class="card-header bg-danger text-white">
                    <h4 class="mb-0">Generate CMO</h4>
                </div>

                <div class="card-body">

                    <form method="POST" action="/generate-cmo">

                        <div class="mb-3">
                            <label class="form-label">Agent</label>

                            <select
                                name="agent_id"
                                class="form-select"
                                required>

                                <option value="">
                                    -- Pilih Agent --
                                </option>

                                {% for agent in agents %}

                                <option value="{{ agent.id }}">
                                    {{ agent.kode_agent }} - {{ agent.nama_agent }}
                                </option>

                                {% endfor %}

                            </select>

                        </div>

                        <div class="mb-3">
                            <label class="form-label">Bulan</label>

                            <select
                                name="bulan"
                                class="form-select"
                                required>

                                {% for i in range(1,13) %}

                                <option value="{{ i }}">
                                    {{ "%02d"|format(i) }}
                                </option>

                                {% endfor %}

                            </select>

                        </div>

                        <div class="mb-3">
                            <label class="form-label">Tahun</label>

                            <input
                                type="number"
                                name="tahun"
                                class="form-control"
                                value="2026"
                                min="2024"
                                max="2035"
                                required>

                        </div>

                        <div class="d-flex justify-content-between">

                            <a href="/" class="btn btn-secondary">
                                ← Kembali
                            </a>

                            <button
                                type="submit"
                                class="btn btn-danger">

                                Generate CMO

                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
