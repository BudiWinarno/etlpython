<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Mapping Stock</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container py-5">

        <div class="row justify-content-center">

            <div class="col-lg-10">

                <div class="card shadow">

                    <div class="card-header bg-primary text-white">
                        <h4 class="mb-0">Edit Mapping Stock</h4>
                    </div>

                    <div class="card-body">

                        <form action="/stock-mapping/update/{{ template.id }}" method="POST">

                            <div class="mb-3">
                                <label class="form-label">Nama Template</label>
                                <input
                                    type="text"
                                    class="form-control"
                                    name="template_name"
                                    value="{{ template.template_name }}"
                                    required>
                            </div>

                            <div class="mb-4">
                                <label class="form-label">Nama Agen</label>
                                <select
                                    class="form-select"
                                    name="agent_id"
                                    required>

                                    {% for agent in agents %}

                                    <option
                                        value="{{ agent.id }}"
                                        {% if agent.id == template.agent_id %}
                                        selected
                                        {% endif %}>
                                        {{ agent.nama_agent }}
                                    </option>

                                    {% endfor %}

                                </select>
                            </div>

                            <div class="table-responsive">

                                <table class="table table-bordered table-hover align-middle">

                                    <thead class="table-primary">

                                        <tr>
                                            <th width="40%">Standard Header</th>
                                            <th>Header Excel</th>
                                        </tr>

                                    </thead>

                                    <tbody>

                                        {% for standard in standard_headers %}

                                        {% if standard != "Qty Terjual (Karton)" %}

                                        <tr>

                                            <td class="fw-semibold">
                                                {{ standard }}
                                            </td>

                                            <td>

                                                <select
                                                    class="form-select"
                                                    name="{{ standard }}">

                                                    <option value="">
                                                        -- Pilih Header --
                                                    </option>

                                                    {% for h in headers %}

                                                    <option
                                                        value="{{ h }}"
                                                        {% if mapping_dict.get(standard) == h %}
                                                        selected
                                                        {% endif %}>
                                                        {{ h }}
                                                    </option>

                                                    {% endfor %}

                                                </select>

                                            </td>

                                        </tr>

                                        {% endif %}

                                        {% endfor %}

                                    </tbody>

                                </table>

                            </div>

                            <div class="d-flex justify-content-between mt-4">

                                <a href="/stock-mapping"
                                   class="btn btn-secondary">
                                    ← Kembali
                                </a>

                                <button
                                    type="submit"
                                    class="btn btn-success">
                                    Update Mapping
                                </button>

                            </div>

                        </form>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
