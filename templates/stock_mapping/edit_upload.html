<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Edit Mapping</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

    <div class="container mt-5">

        <div class="row justify-content-center">

            <div class="col-md-6">

                <div class="card shadow">

                    <div class="card-header bg-primary text-white">
                        <h4 class="mb-0">Edit Mapping Template</h4>
                    </div>

                    <div class="card-body">

                        <form action="/stock-mapping/edit/{{ template.id }}/upload"
                              method="POST"
                              enctype="multipart/form-data">

                            <div class="mb-3">
                                <label class="form-label">Nama Template</label>
                                <input
                                    type="text"
                                    class="form-control"
                                    value="{{ template.template_name }}"
                                    readonly>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Nama Agent</label>
                                <select class="form-select" disabled>

                                    {% for agent in agents %}

                                    <option
                                        {% if agent.id == template.agent_id %}
                                        selected
                                        {% endif %}>
                                        {{ agent.nama_agent }}
                                    </option>

                                    {% endfor %}

                                </select>
                            </div>

                            <div class="mb-4">
                                <label class="form-label">Upload Template Excel</label>
                                <input
                                    type="file"
                                    class="form-control"
                                    name="file"
                                    accept=".xls,.xlsx"
                                    required>
                                <div class="form-text">
                                    Upload template Excel yang akan digunakan untuk proses mapping.
                                </div>
                            </div>

                            <div class="d-flex justify-content-between">

                                <a href="/mapping"
                                   class="btn btn-secondary">
                                    Kembali
                                </a>

                                <button
                                    type="submit"
                                    class="btn btn-primary">
                                    Lanjut Mapping
                                </button>

                            </div>

                        </form>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
