<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Stock Mapping</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="d-flex justify-content-between align-items-center mb-4">

        <h2>Daftar Stock Mapping</h2>

        <a href="/stock-mapping/create" class="btn btn-primary">
            + Tambah Mapping
        </a>

    </div>

    <div class="mb-4">
        <a href="/" class="btn btn-secondary">
            ← Kembali ke HomePage
        </a>
    </div>

    <div class="card shadow-sm">

        <div class="card-body">

            <div class="table-responsive">

                <table class="table table-bordered table-hover table-striped align-middle">

                    <thead class="table-dark">

                        <tr>
                            <th width="80">ID</th>
                            <th>Template</th>
                            <th>Agent</th>
                            <th width="120">Status</th>
                            <th width="180">Aksi</th>
                        </tr>

                    </thead>

                    <tbody>

                        {% for template, agent in templates %}

                        <tr>

                            <td>{{ template.id }}</td>

                            <td>{{ template.template_name }}</td>

                            <td>{{ agent.nama_agent }}</td>

                            <td>

                                {% if template.is_active %}

                                    <span class="badge bg-success">
                                        Aktif
                                    </span>

                                {% else %}

                                    <span class="badge bg-danger">
                                        Non Aktif
                                    </span>

                                {% endif %}

                            </td>

                            <td>

                                <a href="/stock-mapping/edit/{{ template.id }}"
                                   class="btn btn-warning btn-sm">
                                    Edit
                                </a>

                                <form action="/stock-mapping/delete/{{ template.id }}"
                                      method="POST"
                                      style="display:inline;">

                                    <button
                                        type="submit"
                                        class="btn btn-danger btn-sm"
                                        onclick="return confirm('Yakin ingin menghapus template ini?')">

                                        Delete

                                    </button>

                                </form>

                            </td>

                        </tr>

                        {% endfor %}

                    </tbody>

                </table>

            </div>

        </div>

    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
