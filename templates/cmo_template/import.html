<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>Import CMO Template</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

</head>

<body>

<div class="container mt-4">

    <div class="card">

        <div class="card-header">

            <h4>Import Master CMO Template</h4>

        </div>

        <div class="card-body">

            <form
                method="POST"
                enctype="multipart/form-data"
                action="{{ url_for('cmo_template.import_excel') }}">

                <div class="mb-3">

                    <label class="form-label">

                        Agent

                    </label>

                    <select
                        name="agent_id"
                        class="form-select"
                        required>

                        <option value="">

                            -- Pilih Agent --

                        </option>

                        {% for agent in agents %}

                        <option value="{{ agent.id }}">

                            {{ agent.kode_agent }} -
                            {{ agent.nama_agent }}

                        </option>

                        {% endfor %}

                    </select>

                </div>

                <div class="mb-3">

                    <label class="form-label">

                        File Excel

                    </label>

                    <input
                        type="file"
                        name="file"
                        class="form-control"
                        accept=".xlsx,.xls"
                        required>

                </div>

                <div class="alert alert-info">

                    <strong>Header Excel yang digunakan:</strong>

                    <ul class="mb-0 mt-2">

                        <li>item_code</li>
                        <li>item_name</li>
                        <li>item_group_name</li>
                        <li>customer_name</li>
                        <li>berat</li>
                        <li>volume</li>
                        <li>item_box</li>
                        <li>buffer_hari</li>
                        <li>nka_1</li>
                        <li>nka_2</li>
                        <li>nka_3</li>
                        <li>nka_4</li>
                        <li>min_stock</li>
                        <li>min_stock_nka_1</li>
                        <li>min_stock_nka_2</li>
                        <li>order_tambahan</li>

                    </ul>

                </div>

                <button
                    type="submit"
                    class="btn btn-success">

                    Import

                </button>

                <a
                    href="{{ url_for('cmo_template.index') }}"
                    class="btn btn-secondary">

                    Kembali

                </a>

            </form>

        </div>

    </div>

</div>

</body>

</html>
