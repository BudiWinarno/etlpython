<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapping Header</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-lg-10">

            <div class="card shadow">

                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">Mapping Header</h4>
                </div>

                <div class="card-body">

                    <form action="/mapping/save" method="POST">

                        <div class="mb-3">
                            <label class="form-label">
                                Nama Template
                            </label>

                            <input
                                type="text"
                                name="template_name"
                                class="form-control"
                                placeholder="Masukkan Nama Template"
                                required>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">
                                Nama Agent
                            </label>

                            <select
                                name="agent_id"
                                class="form-select"
                                required>

                                <option value="">
                                    -- Pilih Agen --
                                </option>

                                {% for agent in agents %}

                                <option value="{{ agent.id }}">
                                    {{ agent.nama_agent }}
                                </option>

                                {% endfor %}

                            </select>

                        </div>

                        <div class="table-responsive">

                            <table class="table table-bordered table-hover align-middle">

                                <thead class="table-dark">

                                    <tr>
                                        <th width="40%">
                                            Standard Header
                                        </th>

                                        <th>
                                            Header Excel
                                        </th>
                                    </tr>

                                </thead>

                                <tbody>

                                    {% for standard in standard_headers %}

                                    {% if standard != "Qty Terjual (Karton)" %}

                                    <tr>

                                        <td>
                                            <strong>{{ standard }}</strong>
                                        </td>

                                        <td>

                                            <select
                                                name="{{ standard }}"
                                                class="form-select">

                                                <option value="">
                                                    -- Pilih Header --
                                                </option>

                                                {% for h in headers %}

                                                <option value="{{ h }}">
                                                    {{ h }}
                                                </option>

                                                {% endfor %}

                                            </select>

                                        </td>

                                    </tr>

                                    {% endif %}

                                    {% endfor %}

                                </tbody>

                            </table>

                        </div>

                        <div class="d-flex justify-content-between mt-4">

                            <a href="/"
                               class="btn btn-secondary">
                                ← Kembali
                            </a>

                            <button
                                type="submit"
                                class="btn btn-primary">

                                Simpan Mapping

                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
