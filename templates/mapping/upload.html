<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Template</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card shadow">

                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">Upload Template Mapping</h4>
                </div>

                <div class="card-body">

                    <form action="/mapping/upload"
                          method="POST"
                          enctype="multipart/form-data">

                        <div class="mb-3">
                            <label class="form-label">Template</label>

                            <select
                                name="kode_agent"
                                class="form-select"
                                required>

                                <option value="">-- Pilih Template --</option>

                                <option value="LK-000019">
                                    LK-000019
                                </option>

                                <option value="LK-000105">
                                    LK-000105
                                </option>

                                <option value="LK-000148">
                                    LK-000148
                                </option>

                                <option value="LK-000115">
                                    LK-000115
                                </option>

                                 <option value="LK-000048">
                                    LK-000048
                                </option>

                                <option value="LK-000065">
                                    LK-000065
                                </option>

                            </select>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                File Excel
                            </label>

                            <input
                                type="file"
                                name="file"
                                class="form-control"
                                accept=".xlsx,.xls,.xlsb"
                                required>

                            <div class="form-text">
                                Upload file template yang akan dibuat mapping.
                            </div>

                        </div>

                        <div class="d-flex justify-content-between">

                            <a href="/mapping" class="btn btn-secondary">
                                ← Kembali
                            </a>

                            <button
                                type="submit"
                                class="btn btn-primary">

                                Buat Mapping

                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
