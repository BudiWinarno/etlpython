<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Mapping</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-7">

            <div class="card shadow">

                <div class="card-header bg-warning">
                    <h4 class="mb-0">Edit Mapping</h4>
                </div>

                <div class="card-body">

                    <form action="/mapping/edit/{{ template.id }}/upload"
                          method="POST"
                          enctype="multipart/form-data">

                        <div class="mb-3">

                            <label class="form-label">
                                Nama Template
                            </label>

                            <input
                                type="text"
                                class="form-control"
                                value="{{ template.template_name }}"
                                readonly>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Nama Agent
                            </label>

                            <select
                                class="form-select"
                                disabled>

                                {% for agent in agents %}

                                <option
                                    {% if agent.id == template.agent_id %}
                                    selected
                                    {% endif %}>

                                    {{ agent.nama_agent }}

                                </option>

                                {% endfor %}

                            </select>

                        </div>

                        <div class="mb-4">

                            <label class="form-label">
                                Upload Template Excel
                            </label>

                            <input
                                type="file"
                                name="file"
                                class="form-control"
                                accept=".xlsx,.xls,.xlsb"
                                required>

                            <div class="form-text">
                                Upload template Excel terbaru untuk melanjutkan proses mapping.
                            </div>

                        </div>

                        <div class="d-flex justify-content-between">

                            <a href="/mapping"
                               class="btn btn-secondary">
                                ← Kembali
                            </a>

                            <button
                                type="submit"
                                class="btn btn-warning">

                                Lanjut Mapping

                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
