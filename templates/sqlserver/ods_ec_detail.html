<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>ODS EC Detail</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.datatables.net/2.3.2/css/dataTables.bootstrap5.css"
      rel="stylesheet"
    />
  </head>

  <body>
    <div class="container py-4">
      <div class="card shadow-sm">
        <div class="card-header">
          <h4 class="mb-0">ODS EC Detail</h4>
        </div>

        <div class="card-body">
          <div class="table-responsive">
            <div class="row mb-3">
              <div class="col-md-2">
                <select id="month" class="form-select">
                  <option value="">Bulan</option>
                  <option value="1">Januari</option>
                  <option value="2">Februari</option>
                  <option value="3">Maret</option>
                  <option value="4">April</option>
                  <option value="5">Mei</option>
                  <option value="6">Juni</option>
                  <option value="7">Juli</option>
                  <option value="8">Agustus</option>
                  <option value="9">September</option>
                  <option value="10">Oktober</option>
                  <option value="11">November</option>
                  <option value="12">Desember</option>
                </select>
              </div>

              <div class="col-md-2">
                <select id="year" class="form-select">
                  <option value="">Tahun</option>
                  <option>2026</option>
                  <option>2025</option>
                  <option>2024</option>
                </select>
              </div>

              <div class="col-md-3">
                <input
                  id="customer_code"
                  class="form-control"
                  placeholder="Customer Code"
                />
              </div>

              <div class="col-md-2">
                <button class="btn btn-primary w-100" id="btnCari">Cari</button>
              </div>
              <div class="col-md-2">
                <button class="btn btn-success w-100" id="btnExport">
                  Export Excel
                </button>
              </div>
              <div class="col-md-3">
                <a href="/" class="btn btn-secondary"> ← Back Home </a>
              </div>
            </div>
            <!-- <div class="row mb-3">
              <div class="col-md-3">
                <input
                  type="text"
                  id="customer_code"
                  class="form-control"
                  placeholder="Customer Code"
                />
              </div>

              <div class="col-md-3">
                <button id="btnCari" class="btn btn-primary">Cari</button>
              </div>

              <div class="col-md-3">
                <a href="/" class="btn btn-secondary"> ← Back Home </a>
              </div>
            </div> -->

            <table
              id="odsTable"
              class="table table-striped table-bordered table-hover"
            >
              <thead class="table-dark">
                <tr>
                  <th>Customer Code</th>
                  <th>Customer Name</th>
                  <th>Item Code</th>
                  <th>Item Name</th>
                  <th>Bulan</th>
                  <th>Tahun</th>
                  <th>SO Qty PCS</th>
                  <th>SO Qty Karton</th>
                </tr>
              </thead>

              <tbody></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <script src="https://cdn.datatables.net/2.3.2/js/dataTables.js"></script>
    <script src="https://cdn.datatables.net/2.3.2/js/dataTables.bootstrap5.js"></script>

    <script>
      const table = new DataTable("#odsTable", {
        ajax: {
          url: "/api/ods-ec-detail",

          data: function (d) {
            d.customer_code = $("#customer_code").val();
            d.month = $("#month").val();
            d.year = $("#year").val();
          },

          dataSrc: "",
        },

        columns: [
          { data: "Customer Code" },
          { data: "Customer Name" },
          { data: "Item Code" },
          { data: "Item Name" },
          { data: "BULAN_INV" },
          { data: "TAHUN_INV" },
          { data: "SO Quantity PCS" },
          { data: "SO Quantity Karton" },
        ],

        searching: false,
        ordering: true,
        pageLength: 10,
        lengthMenu: [10, 25, 50, 100],
      });

      $("#btnCari").click(function () {
        table.ajax.reload();
      });

      // Tombol Export
      $("#btnExport").click(function () {
        const customer = $("#customer_code").val();
        const month = $("#month").val();
        const year = $("#year").val();

        window.location = `/export-ods-ec-detail?customer_code=${customer}&month=${month}&year=${year}`;
      });
    </script>
  </body>
</html>
