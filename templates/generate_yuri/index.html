<!doctype html>
<html>
  <head>
    <title>Generate Template Yuri</title>
  </head>

  <body>
    <h2>Generate Template Yuri</h2>

    <form action="/generate-yuri" method="POST">
      <label>Agent</label>

      <br />

      <select name="agent_id" required>
        {% for agent in agents %}

        <option value="{{ agent.id }}">{{ agent.nama_agent }}</option>

        {% endfor %}
      </select>

      <br /><br />

      <label>Bulan</label>

      <br />

      <select name="bulan" required>
        {% for i in range(1,13) %}

        <option value="{{ i }}">{{ i }}</option>

        {% endfor %}
      </select>

      <br /><br />

      <label>Tahun</label>

      <br />

      <input type="number" name="tahun" value="2026" required />

      <br /><br />

      <button type="submit">Generate</button>
    </form>

    <br /><br />

    <a href="/"> Kembali Ke HomePage </a>
  </body>
</html>
